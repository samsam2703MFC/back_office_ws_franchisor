<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>L'Atelier By — Console marque (Siège)</title>
<style>
/* ==========================================================================
   L'Atelier By — Back-office Webshop · Console marque (franchiseur)
   Design tokens sourced from the L'Atelier By design system (global.css).
   Standalone implementation — no external runtime dependency.
   ========================================================================== */
:root{
  --color-primary:#8D1D2C;
  --color-secondary:#F2C9A0;
  --color-bg:#EAE4DC;
  --color-surface:#FFFFFF;
  --color-text:#222222;
  --color-text-muted:#666666;
  --color-text-primary:var(--color-text);
  --color-text-secondary:var(--color-text-muted);
  --color-background-secondary:#F4EFE8;
  --color-border-secondary:rgba(34,34,34,.18);
  --color-border-tertiary:rgba(34,34,34,.10);
  --font-display:'Vank','Gotham',Georgia,serif;
  --font-ui:'Gotham',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
}
/* Brand fonts — self-hosted when available; graceful fallback otherwise. */
@font-face{font-family:'Gotham';src:url('_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd/fonts/Gotham_Regular_New.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'Gotham';src:url('_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd/fonts/Gotham_Medium.otf') format('opentype');font-weight:500;font-display:swap}
@font-face{font-family:'Gotham';src:url('_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd/fonts/Gotham_Regular.otf') format('opentype');font-weight:600;font-display:swap}
@font-face{font-family:'Gotham';src:url('_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd/fonts/Gotham_Black.otf') format('opentype');font-weight:700;font-display:swap}
@font-face{font-family:'Vank';src:url('_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd/fonts/GC_Vank.ttf') format('truetype');font-weight:400;font-display:swap;unicode-range:U+0020-007E}

*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);font-family:var(--font-ui);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
input,textarea,select,button,optgroup,option{font-family:var(--font-ui)}
a{color:var(--color-primary);text-decoration:none}
a:hover{color:#6d1622}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-thumb{background:rgba(34,34,34,.2);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
.lz{scrollbar-width:thin}
button,select,input,textarea,a,[onclick]{touch-action:manipulation}
button{-webkit-tap-highlight-color:transparent}
.btn-primary,.btn-secondary{min-height:44px}
select,input[type="text"],input[type="number"],textarea{font-size:13px}

.t-page-title{font-family:var(--font-display);font-weight:400;line-height:1.2;color:var(--color-text)}
.t-section-title{font-family:var(--font-display);font-weight:400;line-height:1.3;color:var(--color-text)}
.t-admin-label{font-family:var(--font-ui);font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-secondary)}
.btn-primary{background:var(--color-primary);color:#fff;border:none;border-radius:8px;padding:11px 16px;font-weight:500;cursor:pointer;line-height:1.2}
.btn-secondary{background:transparent;border:.5px solid var(--color-border-secondary);color:var(--color-text);border-radius:8px;padding:11px 16px;font-weight:500;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script src="./app.js"></script>
</body>
</html>
