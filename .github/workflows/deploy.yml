name: Deploy to server (SSH / rsync)

# Pushes the static back-office (Console marque franchiseur) to the client's
# server over SSH (rsync), exactly like the WebShop repo. This app is the
# Claude Design "DC" export run natively: back_office_ws_franchisor.dc.html +
# support.js (runtime) + bo_server.js / menu_api.js / menu_seed.js (data) +
# the L'Atelier design system under _ds/ + vendored React under vendor/.
# It is served at  http://<host>/webshop/backoffice_franchisor
#
# ─── One-time setup (GitHub → Settings → Secrets and variables → Actions) ─────
#   Secrets (same names as WebShop):
#     SSH_HOST       server IP/host, e.g. 185.180.206.46
#     SSH_USER       ssh user (dedicated deploy user recommended)
#     SSH_PASSWORD   that user's password
#   Optional variables:
#     SSH_PORT       ssh port (default 22)
#     DEPLOY_DIR     absolute server dir mapped to the URL /webshop/backoffice_franchisor
#                    (default /var/www/html/webshop/backoffice_franchisor)
#
#   Notes:
#   • rsync runs WITHOUT --delete, so nothing else on the server is wiped.
#   • An index.html (copy of back_office_ws_franchisor.dc.html) is generated so
#     the directory URL serves the app directly.
#   • SECURITY: prefer a dedicated non-root deploy user + SSH key over the root
#     password (replace the sshpass lines with an ssh-agent key, drop SSH_PASSWORD).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          rm -rf site && mkdir -p site
          cp back_office_ws_franchisor.dc.html api-config.js support.js bo_server.js menu_api.js menu_seed.js site/
          cp back_office_ws_franchisor.dc.html site/index.html
          cp -r _ds site/
          cp -r vendor site/
          mkdir -p site/img && cp img/logo.png site/img/
          ls -R site

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Prepare remote directory (validates SSH login)
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ vars.DEPLOY_DIR || '/var/www/html/webshop/backoffice_franchisor' }}' && command -v rsync >/dev/null || (echo 'rsync manquant sur le serveur — apt-get install -y rsync'; exit 1)"

      - name: Deploy → ${{ vars.DEPLOY_DIR || '/var/www/html/webshop/backoffice_franchisor' }}
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -rltDz --omit-dir-times \
            -e "ssh -p ${{ vars.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            site/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_DIR || '/var/www/html/webshop/backoffice_franchisor' }}/"

      - name: Verify the served page + assets (incl. fonts) on the server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ vars.SSH_PORT || '22' }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s << 'REMOTE'
          BASE="http://localhost/webshop/backoffice_franchisor"
          DS="_ds/l-atelier-by-8504a4e3-7796-44da-b087-3fbd9dcb8dcd"
          echo "== served page references support.js =="
          curl -fsS "$BASE/" | grep -o './support.js' | head -1 || echo "WARN: support.js ref not found"
          echo "== asset status (code type bytes) =="
          fail=0
          for f in api-config.js support.js bo_server.js menu_api.js menu_seed.js \
                   vendor/react.js vendor/react-dom.js \
                   "$DS/global.css" "$DS/_ds_bundle.js" \
                   "$DS/fonts/Gotham_Book.otf" "$DS/fonts/Gotham_Medium.otf" \
                   "$DS/fonts/Gotham_Light.otf" "$DS/fonts/GC_Vank.ttf"; do
            out=$(curl -s -o /dev/null -w "%{http_code} %{content_type} %{size_download}" "$BASE/$f")
            set -- $out; code=$1; type=$2; size=$3
            echo "  $code  $type  ${size}b  $f"
            case "$f" in
              *fonts/*) if [ "$code" != "200" ] || [ "${size:-0}" -lt 1000 ]; then echo "  ^ FONT NOT OK"; fail=1; fi ;;
              *) if [ "$code" != "200" ]; then echo "  ^ ASSET NOT OK"; fail=1; fi ;;
            esac
          done
          if [ "$fail" = "0" ]; then echo "ALL ASSETS OK"; else echo "ASSET CHECK FAILED"; exit 1; fi
          REMOTE
