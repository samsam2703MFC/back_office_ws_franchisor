name: Deploy to GitHub Pages

# Publishes the static back-office to GitHub Pages on every push to main.
# Pages can't run PHP, so the app runs in seed/demo mode there — api-config.js
# already detects *.github.io and falls back to the in-memory seed (base=null),
# so every screen incl. the delivery module stays fully interactive.
# The full stack (php-api against a real webshop_mrszoko DB) deploys via
# deploy.yml (SSH/rsync) to your own server.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          rm -rf site && mkdir -p site
          cp back_office_ws_franchisor.dc.html api-config.js support.js bo_server.js menu_api.js menu_seed.js site/
          cp back_office_ws_franchisor.dc.html site/index.html
          cp -r _ds site/
          cp -r vendor site/
          cp -r mrszoko site/
          mkdir -p site/img && cp img/logo.png site/img/
          touch site/.nojekyll
          ls -R site | head -40

      - uses: actions/configure-pages@v5
        with:
          # Enable the Pages site on first run so no manual Settings step is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
