<?xml version="1.0" encoding="UTF-8"?>
<!-- Mister Szoko brand mark — faithful RECREATION for this repo.
     The design project's binary logo.png (197×185) could not be transferred
     losslessly through this channel, so this SVG reproduces the described mark:
     a smooth dark-chocolate pebble/blob holding a cream negative-space profile
     (quiffed hair + round glasses), with the bold "MISTER SZOKO" wordmark.
     Colours are the design tokens choco-700 / cream-50. Drop the real
     assets/logo.png from the Mister Szoko design system to replace this. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" width="260" height="300" role="img" aria-label="Mister Szoko">
  <!-- pebble / praline blob -->
  <path fill="#41281A" d="M131 8c47-4 88 22 104 62 15 39 6 79-14 108-19 27-49 44-88 45-42 1-79-16-98-49C17 141 15 98 39 63 61 30 90 12 131 8Z"/>
  <!-- cream negative-space profile: head + quiff -->
  <g fill="#FBF6EF">
    <path d="M96 74c8-13 24-22 43-22 11 0 20 3 27 7-6-1-12 0-17 3 7 1 13 5 16 11-9-4-19-4-28-1 9 2 16 8 19 17-11-8-25-11-39-8-13 3-23 11-28 23-3-11-1-22 7-30-1 0-2 1-3 1-2-4 0-8 4-11-1 1-2 1-4 2Z"/>
    <!-- nose / jaw silhouette -->
    <path d="M92 118c1 14 6 27 15 37 5 6 12 10 20 12-6 4-14 5-22 4-2 6-1 12 2 18-11-6-19-16-22-28-3-14 0-30 7-43Z"/>
    <!-- round glasses -->
    <circle cx="120" cy="122" r="15" fill="none" stroke="#FBF6EF" stroke-width="6"/>
    <circle cx="158" cy="120" r="15" fill="none" stroke="#FBF6EF" stroke-width="6"/>
    <path d="M135 121h8" stroke="#FBF6EF" stroke-width="6" fill="none"/>
  </g>
  <!-- wordmark -->
  <text x="130" y="252" text-anchor="middle" fill="#41281A"
        font-family="'Plus Jakarta Sans','Mulish',system-ui,sans-serif"
        font-size="30" font-weight="800" letter-spacing="1.5">MISTER</text>
  <text x="130" y="286" text-anchor="middle" fill="#C68A3C"
        font-family="'Plus Jakarta Sans','Mulish',system-ui,sans-serif"
        font-size="30" font-weight="800" letter-spacing="1.5">SZOKO</text>
</svg>
