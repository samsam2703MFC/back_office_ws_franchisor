<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mister Szoko — brand tile</title>
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0}
  /* Brand tile: the logo badge resting on deep chocolate, with the four
     accent colours as a side strip. Implemented from the Mister Szoko design
     project's thumbnail.html, using the imported design tokens. */
  .tile{width:1280px;height:854px;max-width:100%;display:flex;background:var(--choco-700)}
  .main{flex:1;display:flex;align-items:center;justify-content:center}
  .badge{background:var(--cream-50);border-radius:var(--radius-blob);padding:70px 90px;box-shadow:var(--shadow-xl)}
  .badge img{display:block;height:360px;width:auto}
  .strip{width:200px;display:flex;flex-direction:column}
  .strip>div{flex:1}
</style>
</head>
<body>
<div class="tile">
  <div class="main">
    <div class="badge"><img src="assets/logo.svg" alt="Mister Szoko"></div>
  </div>
  <div class="strip">
    <div style="background:var(--gold-500)"></div>
    <div style="background:var(--caramel-500)"></div>
    <div style="background:var(--pistachio)"></div>
    <div style="background:var(--berry-500)"></div>
  </div>
</div>
</body>
</html>
